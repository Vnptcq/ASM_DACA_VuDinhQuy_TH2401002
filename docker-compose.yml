services:
  db:
    image: postgres:16-alpine
    container_name: hr-management-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Abcd@1234
      POSTGRES_DB: HR_Manage
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d HR_Manage"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hr-management-web
    restart: unless-stopped
    ports:
      - "5080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=HR_Manage;Username=postgres;Password=Abcd@1234"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
